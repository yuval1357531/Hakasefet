<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>הכספת | דאשבורד</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="assets/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="assets/apple-touch-icon-152.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הכספת">
<meta name="theme-color" content="#04060b">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Assistant:wght@400;500;600;700&family=Heebo:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Vault-opening handoff: the blue-fire field from login.html arrives
       full-screen and settles here, uncovering the dashboard beneath.
       Removed instantly on any normal load (no flag = no effect). -->
  <div class="entry-reveal" id="entryReveal" aria-hidden="true"></div>
  <script>
    (function () {
      var el = document.getElementById('entryReveal');
      var mode = null;
      try {
        mode = sessionStorage.getItem('vault_entry_reveal');
        sessionStorage.removeItem('vault_entry_reveal');
      } catch (e) {}
      var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!mode || reduced) { el.parentNode.removeChild(el); return; }
      el.classList.add(mode === 'full' ? 'is-full' : 'is-lite');
      el.addEventListener('animationend', function () {
        if (el.parentNode) el.parentNode.removeChild(el);
      });
    })();
  </script>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <button type="button" class="sidebar-peek" id="sidebarPeek" aria-label="פתיחת התפריט" hidden></button>
  <!-- Minimal help layer (see js/helpTip.js) -- text/positioning both set
       from dashboard.js's updatePeek(), since the peek itself only ever
       exists as inline-styled coordinates, never static markup this class
       could sit next to declaratively. -->
  <button type="button" class="help-tip help-tip-peek" id="sidebarPeekHelp" data-help-id="sidebar-menu" aria-label="הסבר" aria-haspopup="dialog" hidden>?</button>

  <aside class="sidebar" id="sidebar">
    <a class="sidebar-header" href="#/">
      <div class="sidebar-logo">
        <span class="sidebar-logo-ring" aria-hidden="true"></span>
        <img src="assets/sidebar-logo-120.png" alt="" class="sidebar-logo-img">
      </div>
      <div class="sidebar-title gold-title">הכספת</div>
    </a>

    <div class="sidebar-divider" aria-hidden="true"></div>

    <div class="sidebar-scroll">
      <a class="nav-item personal-nav-item" id="personalNavLink" data-id="me" href="#/me">
        <span class="personal-area-icon" aria-hidden="true">
          <img src="assets/jaurius-mask-icon-64.png" alt="" class="personal-area-icon-img">
        </span>
        <span class="personal-area-greeting" id="personalGreeting">שלום</span>
      </a>

      <div class="sidebar-divider-muted" aria-hidden="true"></div>

      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-meta">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>
      <button class="mode-toggle-btn" id="modeToggleBtn" type="button" hidden>
        <span class="mode-toggle-icon" id="modeToggleIcon"></span>
        <span id="modeToggleLabel"></span>
      </button>
      <button class="btn-ghost logout-btn" id="logoutBtn" type="button">התנתקות</button>
    </div>
  </aside>

  <div class="app-main">
    <main class="content-area" id="content"></main>
    <!-- Single shared loading overlay for every real navigation -- see
         js/loader.js. Covers just the content area (sidebar/topbar stay
         visible and usable), fades in only if a navigation actually takes
         a moment, never flashes for an instant. -->
    <div class="content-loader-overlay" id="contentLoaderOverlay" hidden aria-hidden="true"></div>
  </div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
