<style>
  /* The opening screen is a fixed stage, not a scrolling page: nothing
     here should ever pan, drag, or rubber-band in either direction --
     the logo/fields/button stay exactly where they're placed. This is
     purely a scroll/gesture lock; it doesn't touch the logo's own
     hover/touch glow (that's pointer tracking on one element, not page
     scrolling) or any of the intro/flash/domino animations below. */
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* Guarantees the `hidden` attribute always wins over any class-based
     `display` rule below (author-origin CSS otherwise beats the UA
     stylesheet's `[hidden]{display:none}` at equal specificity, which is
     exactly what let the reset panel render on top of the login form
     instead of staying hidden). Every show/hide in this page relies on
     this holding true. */
  [hidden] { display: none !important; }

  body {
    min-height: 100dvh;
    margin: 0;
    background: #050405;
    overflow-x: hidden;
  }
  /* Resting state reads 20% darker so the logo/fields stand out more;
     lifts back to normal the instant the vault answers the touch (see
     .is-bright, toggled in the submit handler below) -- then the existing
     intro/flash sequence carries on exactly as before. A plain overlay
     (not a `filter` on body/html) on purpose: `filter` on an ancestor of
     `position: fixed` elements turns it into their containing block,
     which silently breaks the fullscreen fixed layers (.brand-stage,
     .bg-overlay, etc.) below and causes page overflow -- this sidesteps
     that entirely. */
  .pre-login-dim {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: rgba(0, 0, 0, 0.2);
    transition: opacity 0.6s ease;
  }
  .pre-login-dim.is-bright { opacity: 0; }

  /* --- Stage: fullscreen cover background (masked figure + energy orb) --- */
  .brand-stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #050405;
    overflow: hidden;
  }
  .brand-stage img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* Bias the crop upward so mask + orb stay in frame on wide screens */
    object-position: center 40%;
    display: block;
    animation: bg-breathe 22s ease-in-out infinite alternate;
    transform-origin: center 45%;
    will-change: transform;
  }
  @keyframes bg-breathe {
    from { transform: scale(1); }
    to { transform: scale(1.03); }
  }

  /* Subtle dark overlay: keeps title/fields readable without hiding the art */
  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(5, 4, 5, 0.6) 0%, rgba(5, 4, 5, 0.12) 22%, rgba(5, 4, 5, 0.18) 55%, rgba(5, 4, 5, 0.78) 100%),
      radial-gradient(ellipse at 50% 46%, transparent 40%, rgba(5, 4, 5, 0.36) 100%);
  }

  /* Slow-drifting fog layers between the image and the vignette */
  .fog-layer {
    position: fixed;
    inset: -20%;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
    will-change: transform;
  }
  .fog-a {
    background: radial-gradient(ellipse 60% 35% at 32% 58%, rgba(185, 160, 115, 0.055) 0%, transparent 70%);
    animation: fog-drift-a 55s ease-in-out infinite alternate;
  }
  .fog-b {
    background: radial-gradient(ellipse 55% 30% at 68% 38%, rgba(130, 175, 210, 0.045) 0%, transparent 70%);
    animation: fog-drift-b 72s ease-in-out infinite alternate;
  }
  @keyframes fog-drift-a {
    from { transform: translateX(0) translateY(0); }
    55% { transform: translateX(2.5%) translateY(-0.8%); }
    to { transform: translateX(-1.5%) translateY(0.6%); }
  }
  @keyframes fog-drift-b {
    from { transform: translateX(0) translateY(0); }
    45% { transform: translateX(-2%) translateY(1%); }
    to { transform: translateX(1.8%) translateY(-0.5%); }
  }

  /* Faint drifting particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .particles span {
    position: absolute;
    bottom: -8px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(190, 220, 255, 0.45);
    animation: particle-rise linear infinite;
    opacity: 0;
  }
  .particles span:nth-child(1) { left: 16%; animation-duration: 17s; animation-delay: 0s; }
  .particles span:nth-child(2) { left: 34%; animation-duration: 22s; animation-delay: 5s; background: rgba(120, 190, 255, 0.4); }
  .particles span:nth-child(3) { left: 55%; animation-duration: 19s; animation-delay: 9s; }
  .particles span:nth-child(4) { left: 71%; animation-duration: 24s; animation-delay: 3s; background: rgba(120, 190, 255, 0.35); }
  .particles span:nth-child(5) { left: 87%; animation-duration: 20s; animation-delay: 12s; }
  @keyframes particle-rise {
    0% { transform: translateY(0); opacity: 0; }
    12% { opacity: 0.6; }
    75% { opacity: 0.3; }
    100% { transform: translateY(-92vh); opacity: 0; }
  }

  /* --- Content layer --- */
  .login-content {
    position: relative;
    z-index: 2;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(4vh, 24px) 20px max(5vh, 28px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  /* Applied when the intro video begins: fields + texts dissolve away.
     Still used by the silent remember-me auto-entry path (no video, no
     domino -- see the auto-entry IIFE below), untouched. */
  .login-content.fade-out {
    opacity: 0;
    transform: scale(0.985);
    pointer-events: none;
  }

  /* --- Domino exit (manual "פתח את הכספת" submit only): the video is
     already playing underneath by the time any of this starts (see
     startIntro/dominoExit below) -- each element gets its OWN quick,
     directional dismissal instead of the whole form fading as one flat
     block, staggered so it reads as one fast domino chain instead of a
     simultaneous fade. Short + snappy on purpose (~200-240ms per element,
     ~90ms stagger) so the whole sequence finishes well under half a
     second regardless of how long the intro video itself runs. Secondary
     texts (error/status/remember/forgot-link) get a plain quick fade,
     not a directional slide -- they're not one of the four named
     elements, just quietly clear out of the way alongside them. */
  .domino-exit-fade { transition: opacity 0.16s ease; opacity: 0; pointer-events: none; }
  .domino-exit-btn {
    transition: transform 0.22s cubic-bezier(0.4, 0, 1, 1), opacity 0.22s ease;
    transform: translateY(70px);
    opacity: 0;
  }
  .domino-exit-left {
    transition: transform 0.22s cubic-bezier(0.4, 0, 1, 1), opacity 0.22s ease;
    transform: translateX(-90px);
    opacity: 0;
  }
  .domino-exit-right {
    transition: transform 0.22s cubic-bezier(0.4, 0, 1, 1), opacity 0.22s ease;
    transform: translateX(90px);
    opacity: 0;
  }
  /* .brand-header's own base transform (translate(-50%, -100%)) centers
     it horizontally -- the exit class must keep that -50% X term and only
     add to the Y term, otherwise it would snap back to the left edge
     instead of sliding up from center. */
  .domino-exit-up {
    transition: transform 0.24s cubic-bezier(0.4, 0, 1, 1), opacity 0.24s ease;
    transform: translate(-50%, calc(-100% - 60px));
    opacity: 0;
  }

  /* Title sits just above the login fields -- centered in the heart of
     the screen, not at the page top. Absolute inside .login-content so it
     doesn't disturb the form's own positioning. */
  .brand-header {
    position: absolute;
    top: 30dvh;
    left: 50%;
    transform: translate(-50%, -100%);
    z-index: 3;
    text-align: center;
    animation: title-enter 0.5s ease-out both;
  }
  @keyframes title-enter {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  /* --- The title IS the faceted-diamond artwork (title-diamond.png):
     sapphire-crystal letters keyed out of their source background at the
     pixel level (component detection + morphological closing, not a
     single brightness cut) -- ONLY the letters exist here: no
     rectangle, no base/shelf/shadow under them, no pasted screenshot.
     Two slow, internal living layers, nothing that reads as a moving
     shine: the letters breathe (a whole-stone brightness pulse -- depth,
     not a sweep), and tiny facet sparkles in varied white/sapphire/gold
     tints surface and sink at different spots, like sunlight catching
     different facets deep inside the stone. Beat frequencies (6.5 /
     13.5 / 19s) never realign -> alive, never looping visibly. */
  .brand-title {
    position: relative;
    margin: 0;
    width: min(67.2vw, 320px);
    aspect-ratio: 1595 / 373;
  }
  .brand-title > span { position: absolute; inset: 0; pointer-events: none; }
  /* accessible text, hidden visually */
  .brand-title-sr {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0);
    white-space: nowrap; border: 0;
  }
  /* (0) Ambient halo, sitting BEHIND the letters and NOT masked to their
     shape -- a soft, wide, blurred pool of light that fills the whole
     word's silhouette, including the narrow gaps between letters. This
     is what keeps a gap between two letters reading as "soft light",
     never as a bare dark notch: the halo doesn't care about individual
     glyph edges, it just gently lights the whole area the word sits in,
     like the stone's own glow spilling past the strict outline of the
     letters. Same breathing rhythm as the crystal layer below (6.5s),
     kept in sync deliberately so the whole word pulses as one gem. */
  .brand-title-halo {
    background: radial-gradient(ellipse 58% 68% at 50% 50%,
      rgba(110, 185, 255, 0.22) 0%, rgba(80, 160, 255, 0.1) 45%, transparent 76%);
    filter: blur(16px);
    mix-blend-mode: screen;
    animation: title-halo-breathe 6.5s ease-in-out infinite;
    will-change: opacity;
  }
  @keyframes title-halo-breathe {
    0%, 100% { opacity: 0.4; }
    38% { opacity: 0.48; }
    64% { opacity: 0.42; }
    82% { opacity: 0.52; }
  }
  /* Base letters -- the artwork's own colour and texture carry almost
     all of the weight here on purpose (true to the reference image);
     the "breathe" is only a hair of brightness drift (1% either side of
     neutral) plus a faint drop-shadow, not a colour treatment. This is
     deliberately far more restrained than earlier passes -- the goal is
     the stone looking like itself, with life at the very edge of
     perceptible, not a filtered/tinted version of the source art. */
  .brand-title-crystal {
    background: url('assets/title-diamond.png') center / contain no-repeat;
    animation: title-breathe 6.5s ease-in-out infinite;
    will-change: filter;
  }
  @keyframes title-breathe {
    0%, 100% { filter: brightness(0.99) drop-shadow(0 0 4px rgba(70, 140, 255, 0.16)); }
    38% { filter: brightness(1.005) drop-shadow(0 0 5px rgba(75, 145, 255, 0.2)); }
    64% { filter: brightness(0.995) drop-shadow(0 0 4.5px rgba(72, 142, 255, 0.17)); }
    82% { filter: brightness(1.01) drop-shadow(0 0 6px rgba(80, 150, 255, 0.22)); }
  }
  /* (1b) Rim light: collapses the SAME artwork to a solid silhouette
     (brightness(0) invert(1) turns every opaque pixel pure white, no
     matter how dark that pixel's own colour was) and glows outward from
     that clean shape. This is what finally kills any last dark-pixel
     contamination sitting exactly on the letters' true edge -- rather
     than chasing individual dark pixels in the artwork, a soft bright
     line is drawn exactly along the real alpha boundary, on top, so the
     edge always reads as "lit", never as "dark", regardless of what the
     source pixel there happened to be. Kept just strong enough to do
     that job and no stronger, so it doesn't wash out the artwork's own
     colour. */
  .brand-title-rim {
    background: url('assets/title-diamond.png') center / contain no-repeat;
    filter: brightness(0) invert(1) drop-shadow(0 0 2px rgba(190, 225, 255, 0.8)) blur(0.4px);
    mix-blend-mode: screen;
    opacity: 0.36;
    animation: title-rim-breathe 6.5s ease-in-out infinite;
    will-change: opacity;
  }
  @keyframes title-rim-breathe {
    0%, 100% { opacity: 0.32; }
    38% { opacity: 0.38; }
    64% { opacity: 0.33; }
    82% { opacity: 0.4; }
  }
  /* (2) Facet sparkles -- FIVE independent layers, one anchored to each
     letter's own horizontal zone (the word is 5 letters, ה-כ-ס-פ-ת read
     right to left, so roughly 5 equal 20%-wide bands across the image).
     Each layer is now a SINGLE tiny point of light (not three at once)
     that visits 3 different spots within its own letter over its cycle
     -- a real pinpoint, like one facet catching the sun for a moment,
     never the whole letter lighting up. Each layer runs on its own
     duration (11 / 14.5 / 17.5 / 21.5 / 26s) with its own phase offset,
     so letters catch light one at a time, essentially never in unison,
     and the pattern never repeats on a noticeable rhythm -- genuinely
     random-feeling, though every layer alone is a slow, quiet in/hold/
     out breathe (~1s). Kept small and modest in peak brightness on
     purpose: a glint, not a flash. Masked to the letters' own alpha, so
     a sparkle only ever exists inside a letter. Three tints rotate
     through the layers -- white, a deep "magic" sapphire, and a soft
     warm gold -- like sunlight breaking into its component colours as
     it passes through the crystal, never a single flat glow. */
  .brand-title-sparkle,
  .brand-title-sparkle-b,
  .brand-title-sparkle-c,
  .brand-title-sparkle-d,
  .brand-title-sparkle-e {
    background-repeat: no-repeat;
    -webkit-mask: url('assets/title-diamond.png') center / contain no-repeat;
    mask: url('assets/title-diamond.png') center / contain no-repeat;
    -webkit-mask-mode: alpha;
    mix-blend-mode: screen;
    will-change: background-position, opacity;
  }
  /* Letter 1 (rightmost, ה) -- white */
  .brand-title-sparkle {
    background-image: radial-gradient(closest-side, rgba(255, 255, 255, 0.75) 0%, rgba(225, 240, 255, 0.32) 35%, transparent 72%);
    background-size: 3.2% 11%;
    animation: title-sparkle 11s ease-in-out infinite;
  }
  @keyframes title-sparkle {
    0%   { opacity: 0; background-position: 84% 32%; }
    8%   { opacity: 0.2; background-position: 84% 32%; }
    16%  { opacity: 0; background-position: 84% 32%; }
    41%  { opacity: 0; background-position: 90% 78%; }
    49%  { opacity: 0.18; background-position: 90% 78%; }
    57%  { opacity: 0; background-position: 90% 78%; }
    73%  { opacity: 0; background-position: 87% 55%; }
    81%  { opacity: 0.2; background-position: 87% 55%; }
    89%, 100% { opacity: 0; background-position: 87% 55%; }
  }
  /* Letter 2 (כ) -- sapphire */
  .brand-title-sparkle-b {
    background-image: radial-gradient(closest-side, rgba(150, 198, 255, 0.7) 0%, rgba(85, 145, 235, 0.3) 35%, transparent 72%);
    background-size: 2.6% 9%;
    animation: title-sparkle-b 14.5s ease-in-out infinite;
  }
  @keyframes title-sparkle-b {
    0%   { opacity: 0; background-position: 62% 40%; }
    6%   { opacity: 0.16; background-position: 62% 40%; }
    13%  { opacity: 0; background-position: 62% 40%; }
    38%  { opacity: 0; background-position: 68% 68%; }
    45%  { opacity: 0.18; background-position: 68% 68%; }
    52%  { opacity: 0; background-position: 68% 68%; }
    76%  { opacity: 0; background-position: 65% 25%; }
    83%  { opacity: 0.16; background-position: 65% 25%; }
    90%, 100% { opacity: 0; background-position: 65% 25%; }
  }
  /* Letter 3 (center, ס) -- gold */
  .brand-title-sparkle-c {
    background-image: radial-gradient(closest-side, rgba(255, 232, 180, 0.62) 0%, rgba(255, 205, 120, 0.26) 35%, transparent 72%);
    background-size: 2.4% 8%;
    animation: title-sparkle-c 17.5s ease-in-out infinite;
  }
  @keyframes title-sparkle-c {
    0%   { opacity: 0; background-position: 42% 30%; }
    5%   { opacity: 0.18; background-position: 42% 30%; }
    11%  { opacity: 0; background-position: 42% 30%; }
    35%  { opacity: 0; background-position: 48% 78%; }
    41%  { opacity: 0.16; background-position: 48% 78%; }
    47%  { opacity: 0; background-position: 48% 78%; }
    68%  { opacity: 0; background-position: 45% 50%; }
    74%  { opacity: 0.2; background-position: 45% 50%; }
    81%, 100% { opacity: 0; background-position: 45% 50%; }
  }
  /* Letter 4 (פ) -- white */
  .brand-title-sparkle-d {
    background-image: radial-gradient(closest-side, rgba(255, 255, 255, 0.68) 0%, rgba(225, 240, 255, 0.28) 35%, transparent 72%);
    background-size: 3% 10%;
    animation: title-sparkle-d 21.5s ease-in-out infinite;
  }
  @keyframes title-sparkle-d {
    0%   { opacity: 0; background-position: 24% 45%; }
    4%   { opacity: 0.16; background-position: 24% 45%; }
    9%   { opacity: 0; background-position: 24% 45%; }
    32%  { opacity: 0; background-position: 20% 25%; }
    37%  { opacity: 0.2; background-position: 20% 25%; }
    42%  { opacity: 0; background-position: 20% 25%; }
    64%  { opacity: 0; background-position: 28% 70%; }
    69%  { opacity: 0.18; background-position: 28% 70%; }
    75%, 100% { opacity: 0; background-position: 28% 70%; }
  }
  /* Letter 5 (leftmost, ת) -- sapphire */
  .brand-title-sparkle-e {
    background-image: radial-gradient(closest-side, rgba(150, 198, 255, 0.65) 0%, rgba(85, 145, 235, 0.28) 35%, transparent 72%);
    background-size: 2.8% 9.5%;
    animation: title-sparkle-e 26s ease-in-out infinite;
  }
  @keyframes title-sparkle-e {
    0%   { opacity: 0; background-position: 6% 55%; }
    3%   { opacity: 0.16; background-position: 6% 55%; }
    7%   { opacity: 0; background-position: 6% 55%; }
    28%  { opacity: 0; background-position: 10% 75%; }
    32%  { opacity: 0.18; background-position: 10% 75%; }
    36%  { opacity: 0; background-position: 10% 75%; }
    58%  { opacity: 0; background-position: 2% 35%; }
    62%  { opacity: 0.18; background-position: 2% 35%; }
    67%, 100% { opacity: 0; background-position: 2% 35%; }
  }

  /* --- Interactive touch/mouse glow: real light answering the visitor's
     own hand, exactly where their finger/cursor is on the stone -- not a
     scripted animation like the sparkles above. Two layers, same "masked
     vs. unmasked" split the static halo/crystal pair already uses:
     .brand-title-pointer-halo is a soft, UNmasked bloom sitting behind the
     letters (light spilling out from inside the gem past its own
     silhouette, like the existing static halo but following the pointer);
     .brand-title-pointer-glow is masked to the letters' own alpha shape,
     so the bright core of the light only ever exists INSIDE the stone,
     never spilling onto the transparent gaps between letters. Position is
     driven by --px/--py (percentages, written by JS on pointermove --
     Pointer Events unify mouse and touch, so the same listener drives
     both a mouse cursor and a dragging finger). Opacity fades in only
     while the pointer is actually over/near the title (.is-glowing),
     fades out the instant it leaves -- never lingers, never loops. */
  .brand-title-pointer-halo {
    background: radial-gradient(circle at var(--px, 50%) var(--py, 50%),
      rgba(150, 205, 255, 0.55) 0%, rgba(90, 160, 255, 0.24) 32%, transparent 62%);
    filter: blur(20px);
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.35s ease;
    will-change: opacity;
  }
  .brand-title-pointer-glow {
    background: radial-gradient(circle at var(--px, 50%) var(--py, 50%),
      rgba(255, 255, 255, 0.95) 0%,
      rgba(200, 230, 255, 0.75) 18%,
      rgba(120, 190, 255, 0.4) 40%,
      transparent 66%);
    -webkit-mask: url('assets/title-diamond.png') center / contain no-repeat;
    mask: url('assets/title-diamond.png') center / contain no-repeat;
    -webkit-mask-mode: alpha;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s ease;
    will-change: opacity;
  }
  .brand-title.is-glowing .brand-title-pointer-halo,
  .brand-title.is-glowing .brand-title-pointer-glow {
    opacity: 1;
    transition-duration: 0.12s;
  }

  /* Form floats at the visual center — no card/panel */
  .login-form {
    position: absolute;
    top: 58dvh;
    right: 50%;
    transform: translate(50%, -50%);
    width: min(88%, 360px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: form-enter 0.32s ease-out 0.06s both;
  }
  @keyframes enter {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes form-enter {
    from { opacity: 0; transform: translate(50%, calc(-50% + 10px)); }
    to { opacity: 1; transform: translate(50%, -50%); }
  }

  /* Inputs as polished obsidian slabs: real inner depth (carved, not
     drawn), a faint mineral edge, and on focus the blue light wakes
     INSIDE the stone -- no generic outline ring. */
  .login-form input {
    width: 100%;
    padding: 15px 16px;
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--text-main);
    text-align: right;
    background: linear-gradient(180deg, rgba(13, 18, 28, 0.72) 0%, rgba(6, 9, 15, 0.8) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(110, 170, 240, 0.22);
    border-radius: 12px;
    outline: none;
    box-shadow:
      inset 0 2px 6px rgba(0, 0, 0, 0.55),
      inset 0 -1px 0 rgba(214, 236, 255, 0.05);
    transition: border-color 0.3s ease, box-shadow 0.45s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s ease;
  }
  .login-form input::placeholder { color: rgba(150, 165, 185, 0.8); }
  .login-form input:focus {
    border-color: rgba(140, 200, 255, 0.6);
    background: linear-gradient(180deg, rgba(16, 24, 40, 0.8) 0%, rgba(8, 13, 24, 0.85) 100%);
    box-shadow:
      inset 0 2px 6px rgba(0, 0, 0, 0.5),
      inset 0 0 20px rgba(70, 160, 255, 0.14),
      0 0 26px rgba(70, 160, 255, 0.1);
  }

  .login-form .error-msg { margin: 0; min-height: 0; }
  .login-form .error-msg.show { min-height: 18px; text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9); }

  /* --- "פתח את הכספת": a living crystal. Translucent faceted glass
     with blue fire drifting INSIDE the stone, tiny opal star-points,
     and a reflection that occasionally crosses the polished face.
     Alive at rest, waking on touch -- never loud. --- */
  .login-btn {
    position: relative;
    overflow: hidden;
    width: 100%;
    padding: 15px;
    min-height: 52px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 15.5px;
    letter-spacing: 0.6px;
    color: #f4faff;
    background: linear-gradient(165deg,
      rgba(198, 228, 255, 0.16) 0%,
      rgba(96, 156, 238, 0.2) 26%,
      rgba(34, 76, 158, 0.32) 55%,
      rgba(12, 30, 74, 0.46) 100%);
    backdrop-filter: blur(10px) saturate(1.35);
    -webkit-backdrop-filter: blur(10px) saturate(1.35);
    border: 1px solid rgba(190, 224, 255, 0.5);
    border-radius: 14px;
    cursor: pointer;
    touch-action: manipulation;
    text-shadow: 0 1px 2px rgba(4, 10, 26, 0.65), 0 0 16px rgba(150, 210, 255, 0.5);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.42),
      inset 0 -12px 24px rgba(8, 22, 60, 0.5),
      inset 0 0 26px rgba(80, 160, 255, 0.2),
      0 10px 32px rgba(0, 0, 0, 0.5),
      0 0 26px rgba(70, 150, 255, 0.16);
    transition: border-color 0.35s ease, transform 0.12s ease,
      box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  /* Facet planes: angled slivers of caught light, like a cut gem */
  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    background:
      linear-gradient(112deg, transparent 16%, rgba(255, 255, 255, 0.16) 17%, rgba(255, 255, 255, 0.03) 33%, transparent 34%),
      linear-gradient(248deg, transparent 52%, rgba(255, 255, 255, 0.11) 53%, rgba(255, 255, 255, 0.02) 68%, transparent 69%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 40%);
    mix-blend-mode: screen;
  }
  /* Blue fire living INSIDE the crystal: two soft flames drifting slowly,
     never resting, never loud */
  .vault-btn-core {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    pointer-events: none;
    transition: filter 0.5s ease, transform 0.12s ease;
  }
  .vault-btn-core::before,
  .vault-btn-core::after {
    content: '';
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    filter: blur(16px);
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }
  .vault-btn-core::before {
    left: 8%;
    top: -46px;
    background: radial-gradient(circle, rgba(120, 200, 255, 0.6) 0%, rgba(56, 126, 246, 0.3) 42%, transparent 70%);
    animation: fire-drift-a 6.5s ease-in-out infinite;
  }
  .vault-btn-core::after {
    right: 4%;
    top: -34px;
    background: radial-gradient(circle, rgba(196, 238, 255, 0.5) 0%, rgba(84, 152, 255, 0.24) 46%, transparent 72%);
    animation: fire-drift-b 8.5s ease-in-out infinite;
  }
  @keyframes fire-drift-a {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.65; }
    50% { transform: translate(48px, 10px) scale(1.3); opacity: 1; }
  }
  @keyframes fire-drift-b {
    0%, 100% { transform: translate(0, 8px) scale(1.12); opacity: 0.5; }
    50% { transform: translate(-56px, -6px) scale(0.9); opacity: 0.9; }
  }
  /* Tiny star-points inside the stone, twinkling like a black opal */
  .vault-btn-sparkle {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    mix-blend-mode: screen;
    background:
      radial-gradient(1.6px 1.6px at 18% 34%, rgba(255, 255, 255, 0.95), transparent 62%),
      radial-gradient(1px 1px at 71% 26%, rgba(214, 242, 255, 0.9), transparent 62%),
      radial-gradient(1.4px 1.4px at 45% 70%, rgba(255, 255, 255, 0.85), transparent 62%),
      radial-gradient(1px 1px at 86% 60%, rgba(190, 230, 255, 0.8), transparent 62%),
      radial-gradient(1.2px 1.2px at 29% 78%, rgba(232, 246, 255, 0.75), transparent 62%),
      radial-gradient(1px 1px at 58% 40%, rgba(255, 255, 255, 0.7), transparent 62%);
    animation: sparkle-twinkle 5.2s ease-in-out infinite;
  }
  @keyframes sparkle-twinkle {
    0%, 100% { opacity: 0.22; }
    18% { opacity: 0.65; }
    36% { opacity: 0.3; }
    58% { opacity: 0.8; }
    78% { opacity: 0.35; }
  }
  .vault-btn-label { position: relative; z-index: 1; }
  /* A reflection passing over the polished face -- rare, alive */
  .login-btn::after {
    content: '';
    position: absolute;
    top: -40%;
    bottom: -40%;
    width: 30%;
    left: -42%;
    background: linear-gradient(105deg, transparent 0%, rgba(224, 244, 255, 0.14) 44%, rgba(255, 255, 255, 0.26) 50%, rgba(224, 244, 255, 0.14) 56%, transparent 100%);
    transform: skewX(-18deg) translateX(0);
    animation: sheen-pass 5.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    pointer-events: none;
  }
  @keyframes sheen-pass {
    0%, 76% { transform: skewX(-18deg) translateX(0); opacity: 0; }
    79% { opacity: 1; }
    100% { transform: skewX(-18deg) translateX(560%); opacity: 1; }
  }
  /* Hover: the fire inside wakes -- brighter, not louder */
  .login-btn:hover {
    border-color: rgba(222, 242, 255, 0.75);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.5),
      inset 0 -12px 24px rgba(8, 22, 60, 0.45),
      inset 0 0 34px rgba(96, 176, 255, 0.3),
      0 12px 36px rgba(0, 0, 0, 0.5),
      0 0 38px rgba(86, 166, 255, 0.28);
  }
  .login-btn:hover .vault-btn-core { filter: brightness(1.35) saturate(1.1); }
  /* Press: the energy inside contracts for a beat -- real material depth */
  .login-btn:active {
    transform: translateY(1px);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.35),
      inset 0 -8px 18px rgba(8, 22, 60, 0.55),
      inset 0 0 40px rgba(110, 190, 255, 0.42),
      0 6px 18px rgba(0, 0, 0, 0.55);
  }
  .login-btn:active .vault-btn-core {
    transform: scale(0.97);
    filter: brightness(1.6) saturate(1.15);
    transition: filter 0.08s ease, transform 0.08s ease;
  }
  /* Commit accepted: light floods the whole stone */
  .login-btn.is-awakening {
    border-color: rgba(234, 248, 255, 0.9);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 0 52px rgba(130, 205, 255, 0.55),
      0 10px 34px rgba(0, 0, 0, 0.5),
      0 0 46px rgba(100, 180, 255, 0.4);
  }
  .login-btn.is-awakening::after { animation: none; }
  .login-btn.is-awakening .vault-btn-core { filter: brightness(1.9) saturate(1.2); }

  /* "זכור אותי": a small crystal checkbox -- obsidian at rest, inner
     blue light when checked. Native input kept for accessibility. */
  .remember-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 4px 2px;
    min-height: 36px;
    font-size: 12.5px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    transition: color 0.25s ease;
  }
  .remember-row:hover { color: var(--gold-light); }
  .remember-row input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
  }
  .remember-box {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    flex-shrink: 0;
    position: relative;
    background: linear-gradient(180deg, rgba(13, 18, 28, 0.8), rgba(6, 9, 15, 0.85));
    border: 1px solid rgba(120, 180, 250, 0.35);
    box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
    transition: border-color 0.25s ease, box-shadow 0.35s ease, background 0.25s ease;
  }
  .remember-box::after {
    content: '';
    position: absolute;
    left: 5.5px;
    top: 2px;
    width: 5px;
    height: 9px;
    border: solid #e4f4ff;
    border-width: 0 2px 2px 0;
    transform: rotate(40deg) scale(0.4);
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .remember-row input:checked + .remember-box {
    border-color: rgba(150, 210, 255, 0.8);
    background: linear-gradient(180deg, rgba(30, 70, 150, 0.55), rgba(14, 34, 80, 0.7));
    box-shadow: inset 0 0 10px rgba(90, 170, 255, 0.45), 0 0 10px rgba(80, 160, 255, 0.25);
  }
  .remember-row input:checked + .remember-box::after {
    opacity: 1;
    transform: rotate(40deg) scale(1);
  }
  .remember-row input:focus-visible + .remember-box {
    box-shadow: inset 0 0 10px rgba(90, 170, 255, 0.35), 0 0 0 3px rgba(90, 167, 255, 0.25);
  }

  .forgot-link {
    align-self: center;
    margin-top: 2px;
    font-size: 12.5px;
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px dashed transparent;
    cursor: default;
    opacity: 0.85;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .forgot-link:hover { color: var(--gold-light); border-color: rgba(120, 190, 255, 0.4); }

  /* Failure reason: small + clearly red, tucked right under its field.
     Defined after theme.css so its colour wins over .error-msg's default. */
  .login-error,
  .reset-error {
    color: #ff5f5f;
    font-size: 12px;
    line-height: 1.4;
    text-align: right;
    margin: -4px 2px 0;
    text-shadow: 0 1px 5px rgba(0, 0, 0, 0.85);
  }

  /* Password-reset panel: reuses .login-form's centered placement + input
     styling, so it reads as the same crystal surface, not a new screen. */
  .reset-panel { gap: 12px; }
  .reset-step { display: flex; flex-direction: column; gap: 12px; }
  .reset-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.2px;
    text-align: center;
    color: var(--crystal-ice);
    text-shadow: 0 0 12px rgba(70, 160, 255, 0.4), 0 1px 6px rgba(0, 0, 0, 0.9);
  }
  .reset-hint {
    margin: -4px 0 2px;
    font-size: 12.5px;
    line-height: 1.6;
    text-align: center;
    color: var(--text-muted);
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
  }
  .reset-btn {
    width: 100%;
    padding: 15px;
    min-height: 52px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    color: #f4faff;
    cursor: pointer;
    border-radius: 14px;
    border: 1px solid rgba(190, 224, 255, 0.5);
    background: linear-gradient(165deg,
      rgba(96, 156, 238, 0.22) 0%,
      rgba(34, 76, 158, 0.34) 55%,
      rgba(12, 30, 74, 0.5) 100%);
    text-shadow: 0 1px 2px rgba(4, 10, 26, 0.65), 0 0 16px rgba(150, 210, 255, 0.4);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.32),
      inset 0 0 22px rgba(80, 160, 255, 0.16),
      0 10px 30px rgba(0, 0, 0, 0.45);
    transition: filter 0.25s ease, transform 0.12s ease, box-shadow 0.4s ease;
  }
  .reset-btn:hover { filter: brightness(1.12); }
  .reset-btn:active { transform: translateY(1px); }
  .reset-btn:disabled { opacity: 0.55; cursor: default; filter: none; }

  .status-line {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    min-height: 16px;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
  }

  /* --- Post-login intro video: fullscreen, muted, plays once --- */
  .intro-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.6s ease;
  }
  .intro-layer.visible {
    opacity: 1;
    visibility: visible;
  }
  .intro-layer video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Bright energy flash that peaks at the video's explosion, carrying the
     eye through the navigation into the dashboard */
  .flash-overlay {
    position: fixed;
    inset: 0;
    z-index: 11;
    pointer-events: none;
    background: radial-gradient(circle at 50% 52%, #f2fbff 0%, #cdeaff 40%, #ffffff 100%);
    opacity: 0;
    transition: opacity 0.4s ease-in;
  }
  .flash-overlay.on { opacity: 1; }

  /* "זכור אותי" auto-entry: while body.remember-checking is present (set
     synchronously at the very top of <body>, before first paint), the
     whole login form/logo stays hidden and only this short, clean loader
     shows -- no fields, no full intro animation. Removed again (see the
     module script) either by navigating straight to the dashboard once
     the remembered session checks out, or by the class being taken back
     off if it turns out NOT to be valid, revealing the normal form. */
  body.remember-checking .login-content { display: none; }
  .remember-loader {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 4;
    align-items: center;
    justify-content: center;
  }
  body.remember-checking .remember-loader { display: flex; }
  .remember-loader-svg { width: 74px; height: 74px; overflow: visible; animation: remember-loader-breathe 2.4s ease-in-out infinite; }
  @keyframes remember-loader-breathe {
    0%, 100% {
      filter: drop-shadow(0 0 5px rgba(70, 213, 255, 0.45)) drop-shadow(0 0 16px rgba(29, 78, 158, 0.4));
    }
    50% {
      filter: drop-shadow(0 0 10px rgba(70, 213, 255, 0.75)) drop-shadow(0 0 26px rgba(29, 78, 158, 0.65));
    }
  }
  .remember-loader-ring { fill: none; stroke: rgba(150, 205, 255, 0.22); stroke-width: 3; }
  .remember-loader-arc {
    fill: none;
    stroke: var(--crystal-cyan);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 54 197;
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: remember-loader-orbit 2.6s linear infinite;
  }
  .remember-loader-arc-inner {
    fill: none;
    stroke: var(--crystal-ice);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 24 171;
    opacity: 0.55;
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: remember-loader-orbit-reverse 3.8s linear infinite;
  }
  @keyframes remember-loader-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes remember-loader-orbit-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  .remember-loader-handle {
    transform-box: view-box;
    transform-origin: 50px 50px;
    animation: remember-loader-turn 4.5s linear infinite;
  }
  .remember-loader-handle line { stroke: var(--crystal); stroke-width: 3.5; stroke-linecap: round; }
  .remember-loader-hub { fill: var(--obsidian-raised); stroke: var(--crystal-ice); stroke-width: 2; }
  @keyframes remember-loader-turn { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Desktop: same hierarchy (title top, fields over lower body) */
  @media (min-width: 700px) {
    .login-form { width: 380px; }
    .brand-title { font-size: 56px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .brand-stage img,
    .fog-layer,
    .particles span,
    .brand-header,
    .login-form {
      animation: none;
    }
    .particles { display: none; }
    .login-btn::after { animation: none; }
    .vault-btn-core::before,
    .vault-btn-core::after,
    .vault-btn-sparkle { animation: none; }
    .brand-title-halo,
    .brand-title-crystal,
    .brand-title-rim,
    .brand-title-sparkle,
    .brand-title-sparkle-b,
    .brand-title-sparkle-c,
    .brand-title-sparkle-d,
    .brand-title-sparkle-e { animation: none; }
    .brand-title-sparkle,
    .brand-title-sparkle-b,
    .brand-title-sparkle-c,
    .brand-title-sparkle-d,
    .brand-title-sparkle-e { opacity: 0; }
    .brand-title-crystal { filter: brightness(1); }
    .brand-title-halo { opacity: 0.42; }
    .brand-title-rim { opacity: 0.34; }
    .remember-loader-svg,
    .remember-loader-arc,
    .remember-loader-arc-inner,
    .remember-loader-handle {
      animation: none;
    }
  }
</style>
</head>
<body>
<script>
  // Runs synchronously, before anything below ever paints: if "זכור אותי"
  // was set last time, the login form/fields/logo must never flash on
  // screen at all while we check whether that remembered session is
  // still valid (see the module script's auto-entry block near the
  // bottom) -- this class hides .login-content and reveals #rememberLoader
  // instead, from the very first frame. If the check later finds the
  // session actually expired, the module script removes this class again
  // and the visitor sees the normal login form exactly as if this never
  // ran -- so a not-actually-remembered visitor is never stuck looking at
  // a loader with nothing behind it.
  (function () {
    try {
      if (localStorage.getItem('vault_remember') === '1') {
        document.body.classList.add('remember-checking');
      }
    } catch (e) {}
  })();
</script>

  <div class="brand-stage" aria-hidden="true">
    <img src="assets/login-bg.png" alt="">
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="fog-layer fog-a" aria-hidden="true"></div>
  <div class="fog-layer fog-b" aria-hidden="true"></div>
  <div class="particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="pre-login-dim" id="preLoginDim" aria-hidden="true"></div>

  <!-- Short, clean loader shown ONLY while a remembered session is being
       confirmed (see the body.remember-checking rule below) -- same
       vault-lock motif as the dashboard's own shared loader
       (js/loader.js), a self-contained copy here since this page doesn't
       otherwise load dashboard.css. -->
  <div class="remember-loader" id="rememberLoader" aria-hidden="true">
    <svg class="remember-loader-svg" viewBox="0 0 100 100">
      <circle class="remember-loader-ring" cx="50" cy="50" r="40"></circle>
      <circle class="remember-loader-arc" cx="50" cy="50" r="40"></circle>
      <circle class="remember-loader-arc-inner" cx="50" cy="50" r="31"></circle>
      <g class="remember-loader-handle">
        <line x1="50" y1="27" x2="50" y2="73"></line>
        <line x1="27" y1="50" x2="73" y2="50"></line>
        <circle class="remember-loader-hub" cx="50" cy="50" r="8"></circle>
      </g>
    </svg>
  </div>

  <div class="login-content" id="loginContent">
    <header class="brand-header">
      <h1 class="brand-title" aria-label="הכספת">
        <span class="brand-title-sr">הכספת</span>
        <span class="brand-title-halo"></span>
        <span class="brand-title-crystal"></span>
        <span class="brand-title-rim"></span>
        <span class="brand-title-sparkle"></span>
        <span class="brand-title-sparkle-b"></span>
        <span class="brand-title-sparkle-c"></span>
        <span class="brand-title-sparkle-d"></span>
        <span class="brand-title-sparkle-e"></span>
        <span class="brand-title-pointer-halo" aria-hidden="true"></span>
        <span class="brand-title-pointer-glow" aria-hidden="true"></span>
      </h1>
    </header>

    <!-- autocomplete="off" on the form/fields + no name attributes (the
         script only ever reads by id) -- reduces how strongly the browser
         reads this as "a login form worth offering to save", per the
         "לצמצם שמירת סיסמה של הדפדפן" requirement. This is a best-effort
         reduction, not a guarantee: Chrome in particular has deliberately
         ignored autocomplete="off" for password-save prompts since ~2014,
         by design, so some browsers may still occasionally offer to save
         regardless of anything markup-side can do. The app's own "זכור
         אותי" is unrelated to any of this (it rides on the Supabase
         session, not on browser-saved credentials) and is untouched. -->
    <form id="loginForm" novalidate class="login-form" autocomplete="off">
      <input type="email" id="username" placeholder="אימייל" aria-label="אימייל" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" dir="ltr">
      <input type="password" id="password" placeholder="סיסמה" aria-label="סיסמה" autocomplete="new-password">

      <!-- The reason a login failed shows here, small + red, right under
           the password field, so the cause is read exactly where it's
           looked for. -->
      <div class="error-msg login-error" id="errorMsg" role="alert"></div>

      <label class="remember-row" for="rememberMe">
        <input type="checkbox" id="rememberMe">
        <span class="remember-box" aria-hidden="true"></span>
        <span>זכור אותי</span>
      </label>

      <button type="submit" class="login-btn" id="openVaultBtn">
        <span class="vault-btn-core" aria-hidden="true"></span>
        <span class="vault-btn-sparkle" aria-hidden="true"></span>
        <span class="vault-btn-label">פתח את הכספת</span>
      </button>

      <a href="#" class="forgot-link" id="forgotLink">שכחתי סיסמה?</a>

      <div class="status-line" id="statusLine"></div>
    </form>

    <!-- Self-service password reset. Hidden until "שכחתי סיסמה?" is
         tapped, and only ever one of its two steps is visible at once --
         the login form and both reset steps are mutually exclusive. -->
    <div id="resetPanel" class="login-form reset-panel" hidden>

      <!-- Step 1: request a code -->
      <div class="reset-step" id="resetStepRequest">
        <h2 class="reset-title">איפוס סיסמה</h2>
        <input type="email" id="resetEmail" placeholder="האימייל שלך" aria-label="האימייל שלך"
               autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" dir="ltr">
        <div class="reset-error" id="resetRequestError" role="alert"></div>
        <button type="button" class="reset-btn" id="sendCodeBtn">שלח קוד לאיפוס</button>
        <a href="#" class="forgot-link" id="backToLoginFromRequest">חזרה להתחברות</a>
      </div>

      <!-- Step 2: enter the code + set a new password -->
      <div class="reset-step" id="resetStepConfirm" hidden>
        <h2 class="reset-title">איפוס סיסמה</h2>
        <p class="reset-hint" id="resetSentHint">אם המייל קיים במערכת, נשלח אליו קוד לאיפוס סיסמה.</p>
        <input type="text" id="resetCode" placeholder="קוד האימות (6 ספרות)" aria-label="קוד האימות"
               inputmode="numeric" autocomplete="one-time-code" dir="ltr" maxlength="6">
        <input type="password" id="resetNewPass" placeholder="סיסמה חדשה" aria-label="סיסמה חדשה" autocomplete="new-password">
        <input type="password" id="resetConfirmPass" placeholder="אימות סיסמה חדשה" aria-label="אימות סיסמה חדשה" autocomplete="new-password">
        <div class="reset-error" id="resetConfirmError" role="alert"></div>
        <button type="button" class="reset-btn" id="confirmResetBtn">עדכן סיסמה</button>
        <a href="#" class="forgot-link" id="resendCodeLink">לא קיבלת קוד? שלח שוב</a>
        <a href="#" class="forgot-link" id="backToLoginFromConfirm">חזרה להתחברות</a>
      </div>
    </div>
  </div>

  <!-- Hidden until a successful login; never plays before/on failed auth -->
  <div class="intro-layer" id="introLayer" aria-hidden="true">
    <video id="introVideo" src="assets/login-intro.mp4" muted playsinline webkit-playsinline preload="auto"></video>
  </div>
  <div class="flash-overlay" id="flashOverlay" aria-hidden="true"></div>

<script type="module">
  import { auth } from './js/auth.js';
  import { supabase } from './js/supabaseClient.js';

  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const errorMsg = document.getElementById('errorMsg');
  const forgotLink = document.getElementById('forgotLink');
  const statusLine = document.getElementById('statusLine');
  const loginContent = document.getElementById('loginContent');
  const preLoginDim = document.getElementById('preLoginDim');
  const introLayer = document.getElementById('introLayer');
  const introVideo = document.getElementById('introVideo');
  const flashOverlay = document.getElementById('flashOverlay');
  const openVaultBtn = document.getElementById('openVaultBtn');
  const rememberMe = document.getElementById('rememberMe');
  const brandHeader = document.querySelector('.brand-header');
  const rememberRow = document.querySelector('.remember-row');

  // Single-active-session enforcement (see auth.js's kickIfSuperseded) --
  // every account, students included: this device's own session was just
  // invalidated because a newer explicit login happened somewhere else on
  // the same account -- "זכור אותי" was already cleared there, so this is
  // purely a heads-up message, not a security gate on its own.
  if (new URLSearchParams(window.location.search).get('kicked') === '1') {
    errorMsg.textContent = 'התחברת ממכשיר אחר. יש להזין סיסמה מחדש.';
    errorMsg.classList.add('show');
  }

  // --- Interactive touch/mouse glow on the הכספת logo: a light that
  // answers the visitor's own hand, exactly where their finger/cursor is
  // (see the .brand-title-pointer-halo/.brand-title-pointer-glow CSS
  // above). Pointer Events unify mouse and touch -- the same listener
  // drives a dragging finger on mobile and a moving cursor on desktop,
  // per the "רספונסיבי, טאצ' או עכבר" requirement. Position is written as
  // plain percentages into --px/--py so the CSS radial-gradients (one
  // masked to the letters, one a soft unmasked bloom behind them) always
  // read it live -- no animation loop, purely reactive to real input. */
  const brandTitle = document.querySelector('.brand-title');
  if (brandTitle && window.PointerEvent) {
    let hideTimer = null;
    function updatePointerGlow(e) {
      const rect = brandTitle.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      const px = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
      const py = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
      brandTitle.style.setProperty('--px', px + '%');
      brandTitle.style.setProperty('--py', py + '%');
      brandTitle.classList.add('is-glowing');
      if (hideTimer) {
        clearTimeout(hideTimer);
        hideTimer = null;
      }
    }
    function scheduleHideGlow() {
      // A short grace period rather than an instant cut -- a finger
      // lifting off touch fires pointerup/leave in the same instant as
      // the last pointermove, so an immediate removal could flicker.
      hideTimer = setTimeout(() => brandTitle.classList.remove('is-glowing'), 60);
    }
    brandHeader.addEventListener('pointermove', updatePointerGlow);
    brandHeader.addEventListener('pointerdown', updatePointerGlow);
    brandHeader.addEventListener('pointerleave', scheduleHideGlow);
    brandHeader.addEventListener('pointerup', scheduleHideGlow);
    brandHeader.addEventListener('pointercancel', scheduleHideGlow);
  }

  // --- "זכור אותי": no password is ever stored. We keep only the
  // username + a flag; the auto-entry itself rides on Supabase's own
  // secure persisted session (cleared by logout / expiry). -------------
  const store = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
    remove(k) { try { localStorage.removeItem(k); } catch (e) {} },
  };

  if (store.get('vault_remember') === '1') {
    rememberMe.checked = true;
    const savedUser = store.get('vault_remember_user');
    if (savedUser && !usernameInput.value) usernameInput.value = savedUser;
  }

  function showError(text) {
    errorMsg.textContent = text;
    errorMsg.classList.add('show');
  }

  function clearError() {
    errorMsg.textContent = '';
    errorMsg.classList.remove('show');
  }

  let navigated = false;
  // `revealMode` -- flags dashboard.html to play its own already-built
  // "entry-reveal" settle animation (a radial-gradient field that calms
  // into the dashboard, see css/dashboard.css's .entry-reveal) right as
  // it loads, instead of a plain instant cut. `true`/'full' is the bright
  // version used after the intro video's own flash; 'lite' is the same
  // mechanism's smaller/quieter variant, used only by the remember-me
  // auto-entry path below (a short loader settling into the dashboard,
  // not a video's dramatic flash).
  function goDashboard(revealMode) {
    if (navigated) return;
    navigated = true;
    if (revealMode) {
      try { sessionStorage.setItem('vault_entry_reveal', revealMode === 'lite' ? 'lite' : 'full'); } catch (e) {}
    }
    window.location.replace('dashboard.html');
  }

  // Timed so the flash peaks exactly at the video's final energy burst,
  // then the dashboard takes over -- continuing smoothly into
  // dashboard.html's own entry-reveal (see goDashboard above) instead of
  // a sudden cut to black.
  let flashStarted = false;
  introVideo.addEventListener('timeupdate', () => {
    if (!flashStarted && introVideo.duration && introVideo.duration - introVideo.currentTime <= 0.45) {
      flashStarted = true;
      flashOverlay.classList.add('on');
    }
  });
  introVideo.addEventListener('ended', () => {
    flashOverlay.classList.add('on');
    setTimeout(() => goDashboard(true), 300);
  });
  // If the video can't load/play for any reason, never trap the user here.
  introVideo.addEventListener('error', () => goDashboard(true));

  // Domino exit: button -> password -> username -> logo, each a quick
  // directional slide, staggered ~90ms apart so the whole chain reads as
  // one fast, deliberate sequence rather than a simultaneous fade. Fires
  // the instant the video starts (see startIntro) -- never waits for any
  // of this to finish before the video itself begins playing.
  const DOMINO_STAGGER = 90;
  function dominoExit() {
    [errorMsg, forgotLink, statusLine, rememberRow].forEach((el) => {
      if (el) el.classList.add('domino-exit-fade');
    });
    const sequence = [
      [openVaultBtn, 'domino-exit-btn'],
      [passwordInput, 'domino-exit-left'],
      [usernameInput, 'domino-exit-right'],
      [brandHeader, 'domino-exit-up'],
    ];
    sequence.forEach(([el, cls], i) => {
      if (!el) return;
      setTimeout(() => el.classList.add(cls), i * DOMINO_STAGGER);
    });
    // Once the whole chain has visually finished, stop the (now empty)
    // form from intercepting any further pointer input -- same end state
    // `.fade-out` already gave the simpler paths.
    setTimeout(() => { loginContent.style.pointerEvents = 'none'; }, sequence.length * DOMINO_STAGGER + 260);
  }

  function startIntro() {
    introLayer.classList.add('visible');
    dominoExit();

    try {
      introVideo.currentTime = 0;
      const playPromise = introVideo.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch(() => goDashboard(true));
      }
    } catch (e) {
      goDashboard(true);
      return;
    }

    // Watchdog: if playback stalls indefinitely, continue to the dashboard.
    const budget = isFinite(introVideo.duration) && introVideo.duration > 0
      ? (introVideo.duration + 4) * 1000
      : 20000;
    setTimeout(() => goDashboard(true), budget);
  }

  // Auto-entry: remember-me + a still-valid Supabase session means the
  // vault already recognizes its owner. The login form/logo were hidden
  // from the very first paint by the synchronous script at the top of
  // <body> (body.remember-checking) -- ONLY the short loader is visible
  // right now, no fields, no full intro animation. If the session really
  // is still valid, this goes straight to the dashboard once the loader
  // has had a brief, deliberate moment on screen (never an instant jump-
  // cut, never a lingering wait). If it turns out NOT valid (expired/
  // revoked since last visit), the remember-checking class comes back
  // off, revealing the completely normal login form -- exactly what a
  // never-remembered visitor already sees.
  (async () => {
    if (!document.body.classList.contains('remember-checking')) return;
    try {
      const { data } = await supabase.auth.getSession();
      if (!data || !data.session || navigated) {
        document.body.classList.remove('remember-checking');
        return;
      }
      setTimeout(() => goDashboard('lite'), 420);
    } catch (e) {
      document.body.classList.remove('remember-checking');
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Lowercased defensively: mobile keyboards auto-capitalize the first
    // letter of a plain-text field, which would otherwise silently turn a
    // correctly-remembered email into a login failure.
    const username = usernameInput.value.trim().toLowerCase();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showError('יש למלא שם משתמש וסיסמה כדי להיכנס לכספת');
      return;
    }

    // Living matter answers the touch immediately -- the mechanism
    // engages before the network finishes. Screen brightness answers the
    // same touch: the 20%-dimmed resting state lifts back to normal right
    // here, not after the network resolves.
    openVaultBtn.disabled = true;
    openVaultBtn.classList.add('is-awakening');
    preLoginDim.classList.add('is-bright');

    const result = await auth.login(username, password);
    if (!result.ok) {
      openVaultBtn.disabled = false;
      openVaultBtn.classList.remove('is-awakening');
      preLoginDim.classList.remove('is-bright');
      showError(
        result.reason === 'blocked' ? 'החשבון חסום. יש לפנות למנהל המערכת'
        : result.reason === 'expired' ? 'תוקף הגישה שלך פג. יש לפנות למנהל המערכת'
        : 'האימייל או הסיסמה שגויים'
      );
      return;
    }

    clearError();
    if (rememberMe.checked) {
      store.set('vault_remember', '1');
      store.set('vault_remember_user', username);
    } else {
      store.remove('vault_remember');
      store.remove('vault_remember_user');
    }
    statusLine.textContent = 'הדלת נפתחת...';
    startIntro();
  });

  [usernameInput, passwordInput].forEach((input) => {
    input.addEventListener('input', clearError);
  });

  // --- Self-service password reset via an emailed 6-digit code ---------
  // Step 1 (request): resetPasswordForEmail(email) -- Supabase itself only
  // actually sends mail for an address that exists, but always resolves
  // the same way either way, so the UI shows one generic message
  // regardless and never reveals whether the account exists.
  // Step 2 (confirm): verifyOtp({type:'recovery'}) exchanges the code for
  // a short-lived recovery session, updateUser sets the new password, then
  // that session is deliberately signed out again -- the user lands back
  // on the plain login form and signs in fresh with the new password,
  // rather than being carried straight into the vault.
  const loginForm = document.getElementById('loginForm');
  const resetPanel = document.getElementById('resetPanel');
  const resetStepRequest = document.getElementById('resetStepRequest');
  const resetStepConfirm = document.getElementById('resetStepConfirm');
  const resetEmail = document.getElementById('resetEmail');
  const resetRequestError = document.getElementById('resetRequestError');
  const sendCodeBtn = document.getElementById('sendCodeBtn');
  const resetCode = document.getElementById('resetCode');
  const resetNewPass = document.getElementById('resetNewPass');
  const resetConfirmPass = document.getElementById('resetConfirmPass');
  const resetConfirmError = document.getElementById('resetConfirmError');
  const confirmResetBtn = document.getElementById('confirmResetBtn');
  const resendCodeLink = document.getElementById('resendCodeLink');
  const backToLoginFromRequest = document.getElementById('backToLoginFromRequest');
  const backToLoginFromConfirm = document.getElementById('backToLoginFromConfirm');

  function showStep(step) {
    loginForm.hidden = step !== 'login';
    resetPanel.hidden = step === 'login';
    resetStepRequest.hidden = step !== 'request';
    resetStepConfirm.hidden = step !== 'confirm';
  }

  function openResetFlow() {
    resetRequestError.textContent = '';
    resetConfirmError.textContent = '';
    resetCode.value = '';
    resetNewPass.value = '';
    resetConfirmPass.value = '';
    // Carry over whatever email they already typed on the login form.
    if (!resetEmail.value && usernameInput.value) resetEmail.value = usernameInput.value.trim();
    showStep('request');
    resetEmail.focus();
  }

  function backToLogin(message) {
    showStep('login');
    clearError();
    statusLine.textContent = message || '';
  }

  async function sendResetCode() {
    const email = resetEmail.value.trim().toLowerCase();
    resetRequestError.textContent = '';
    if (!email) {
      resetRequestError.textContent = 'יש להזין אימייל';
      return;
    }
    sendCodeBtn.disabled = true;
    sendCodeBtn.textContent = 'שולח...';
    const { error } = await supabase.auth.resetPasswordForEmail(email);
    sendCodeBtn.disabled = false;
    sendCodeBtn.textContent = 'שלח קוד לאיפוס';
    if (error) {
      resetRequestError.textContent = 'לא הצלחנו לשלוח כרגע, נסה שוב בעוד רגע';
      return;
    }
    showStep('confirm');
    resetCode.focus();
  }

  async function confirmReset() {
    const email = resetEmail.value.trim().toLowerCase();
    const token = resetCode.value.trim();
    const newPassword = resetNewPass.value;
    const confirmPassword = resetConfirmPass.value;
    resetConfirmError.textContent = '';

    if (token.length < 6) {
      resetConfirmError.textContent = 'הזן את קוד האימות בן 6 הספרות';
      return;
    }
    if (newPassword.length < 6) {
      resetConfirmError.textContent = 'הסיסמה חייבת להכיל לפחות 6 תווים';
      return;
    }
    if (newPassword !== confirmPassword) {
      resetConfirmError.textContent = 'הסיסמאות אינן תואמות';
      return;
    }

    confirmResetBtn.disabled = true;
    confirmResetBtn.textContent = 'מאמת...';

    const { data: verifyData, error: verifyErr } = await supabase.auth.verifyOtp({ email, token, type: 'recovery' });
    if (verifyErr) {
      confirmResetBtn.disabled = false;
      confirmResetBtn.textContent = 'עדכן סיסמה';
      resetConfirmError.textContent = 'הקוד שגוי או שפג תוקפו. בקש קוד חדש';
      return;
    }

    const { error: updateErr } = await supabase.auth.updateUser({ password: newPassword });
    if (updateErr) {
      confirmResetBtn.disabled = false;
      confirmResetBtn.textContent = 'עדכן סיסמה';
      resetConfirmError.textContent = 'עדכון הסיסמה נכשל, נסה שוב';
      return;
    }

    // Notify the master: a small, best-effort log row -- never blocks the
    // user's own flow if it fails for any reason.
    try {
      const userId = verifyData?.user?.id || verifyData?.session?.user?.id;
      if (userId) {
        await supabase.from('password_reset_events').insert({ user_id: userId, email });
      }
    } catch (e) { /* non-blocking */ }

    // The recovery session is single-purpose -- sign out so the user
    // returns to a normal, unauthenticated login screen.
    await supabase.auth.signOut();

    confirmResetBtn.disabled = false;
    confirmResetBtn.textContent = 'עדכן סיסמה';
    usernameInput.value = email;
    passwordInput.value = '';
    backToLogin('הסיסמה עודכנה בהצלחה. אפשר להתחבר עכשיו.');
    passwordInput.focus();
  }

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    openResetFlow();
  });
  backToLoginFromRequest.addEventListener('click', (e) => {
    e.preventDefault();
    backToLogin();
  });
  backToLoginFromConfirm.addEventListener('click', (e) => {
    e.preventDefault();
    backToLogin();
  });
  sendCodeBtn.addEventListener('click', sendResetCode);
  confirmResetBtn.addEventListener('click', confirmReset);
  resendCodeLink.addEventListener('click', (e) => {
    e.preventDefault();
    resetConfirmError.textContent = '';
    showStep('request');
    sendResetCode();
  });
  [resetCode, resetNewPass, resetConfirmPass].forEach((input) => {
    input.addEventListener('input', () => { resetConfirmError.textContent = ''; });
  });
  resetEmail.addEventListener('input', () => { resetRequestError.textContent = ''; });
</script>
</body>
</html>
